<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" font-family="monospace,sans-serif">
  <rect width="720" height="380" fill="#0d1117"/>
  <text x="360" y="34" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">ML compute (CPU only, SSE2, no AVX/FMA)</text>
  <text x="360" y="54" text-anchor="middle" fill="#8b949e" font-size="12">Deterministic bit-identical results across cores — reproducible by design</text>

  <!-- matmul gflops: 11.8 single, 9.6 multicore -->
  <!-- inference: 60,357/s -->

  <!-- Row 1: matmul single core -->
  <text x="195" y="113" text-anchor="end" fill="#8b949e" font-size="11">128x128 matmul (1 core)</text>
  <rect x="200" y="88"  width="580" height="40" rx="4" fill="#21262d"/>
  <!-- 11.8 GFLOP/s shown -->
  <rect x="200" y="88"  width="580" height="40" rx="4" fill="#1f6feb"/>
  <text x="490" y="113" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">11.8 GFLOP/s</text>

  <!-- Row 2: matmul 8 workers -->
  <text x="195" y="183" text-anchor="end" fill="#8b949e" font-size="11">128x128 matmul (8 workers)</text>
  <rect x="200" y="158" width="580" height="40" rx="4" fill="#21262d"/>
  <rect x="200" y="158" width="473" height="40" rx="4" fill="#238636"/>
  <text x="440" y="183" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">9.6 GFLOP/s (81% scaling)</text>

  <!-- Row 3: neural inference -->
  <text x="195" y="265" text-anchor="end" fill="#8b949e" font-size="11">Neural infer (2x16x8x1 MLP)</text>
  <rect x="200" y="240" width="580" height="40" rx="4" fill="#21262d"/>
  <rect x="200" y="240" width="260" height="40" rx="4" fill="#9e6a03"/>
  <text x="330" y="265" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">60,357 infer/s</text>

  <!-- Note -->
  <text x="200" y="310" fill="#8b949e" font-size="11">* Bit-identical across 8 workers — deterministic execution enforced</text>
  <text x="200" y="328" fill="#8b949e" font-size="11">* Enable AVX/FMA with run-bench.ps1 -Fma for higher throughput (non-deterministic)</text>
  <text x="200" y="346" fill="#58a6ff" font-size="11">* No PyTorch, no CUDA, no external libraries — pure Rust on bare metal</text>
</svg>
