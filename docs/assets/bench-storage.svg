<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" font-family="monospace,sans-serif">
  <rect width="720" height="380" fill="#0d1117"/>
  <text x="360" y="34" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="bold">Storage I/O (IOPS, virtio-blk in QEMU)</text>
  <text x="360" y="54" text-anchor="middle" fill="#8b949e" font-size="12">Content-addressed object graph — reads fast, writes bounded by virtio emulation</text>

  <!-- grid lines -->
  <line x1="200" y1="70" x2="200" y2="330" stroke="#21262d" stroke-width="1"/>
  <line x1="320" y1="70" x2="320" y2="330" stroke="#21262d" stroke-width="1"/>
  <line x1="440" y1="70" x2="440" y2="330" stroke="#21262d" stroke-width="1"/>
  <line x1="560" y1="70" x2="560" y2="330" stroke="#21262d" stroke-width="1"/>
  <line x1="680" y1="70" x2="680" y2="330" stroke="#21262d" stroke-width="1"/>

  <!-- X axis labels (0 / 10K / 20K / 30K / 40K) -->
  <text x="200" y="348" text-anchor="middle" fill="#8b949e" font-size="10">0</text>
  <text x="320" y="348" text-anchor="middle" fill="#8b949e" font-size="10">10K</text>
  <text x="440" y="348" text-anchor="middle" fill="#8b949e" font-size="10">20K</text>
  <text x="560" y="348" text-anchor="middle" fill="#8b949e" font-size="10">30K</text>
  <text x="680" y="348" text-anchor="middle" fill="#8b949e" font-size="10">40K IOPS</text>

  <!-- rows -->
  <!-- Seq Read 39,070 → 480*(39070/40000)=469 -->
  <text x="195" y="105" text-anchor="end" fill="#8b949e" font-size="11">Seq Read</text>
  <rect x="200" y="82" width="469" height="36" rx="4" fill="#1f6feb"/>
  <text x="678" y="105" fill="#e6edf3" font-size="12" text-anchor="end">39,070 IOPS</text>

  <!-- Rand Read 35,585 → 427 -->
  <text x="195" y="165" text-anchor="end" fill="#8b949e" font-size="11">Rand Read</text>
  <rect x="200" y="142" width="427" height="36" rx="4" fill="#1f6feb" opacity="0.8"/>
  <text x="635" y="165" fill="#e6edf3" font-size="12" text-anchor="end">35,585 IOPS</text>

  <!-- Seq Write 1,694 → 20 -->
  <text x="195" y="225" text-anchor="end" fill="#8b949e" font-size="11">Seq Write</text>
  <rect x="200" y="202" width="20" height="36" rx="4" fill="#9e6a03"/>
  <text x="230" y="225" fill="#e6edf3" font-size="12">1,694 IOPS</text>

  <!-- Rand Write 1,709 → 20 -->
  <text x="195" y="285" text-anchor="end" fill="#8b949e" font-size="11">Rand Write</text>
  <rect x="200" y="262" width="20" height="36" rx="4" fill="#9e6a03"/>
  <text x="230" y="285" fill="#e6edf3" font-size="12">1,709 IOPS</text>

  <!-- Object put 14,252 → 171 -->
  <text x="195" y="315" text-anchor="end" fill="#8b949e" font-size="11">Obj store puts</text>
  <rect x="200" y="302" width="171" height="24" rx="4" fill="#238636"/>
  <text x="379" y="318" fill="#e6edf3" font-size="11">14,252 obj/s</text>

  <text x="360" y="368" text-anchor="middle" fill="#58a6ff" font-size="11">Write IOPS bounded by virtio-blk emulation overhead, not the object graph itself</text>
</svg>
