name: CI

# Builds and tests both architecture targets on every push / PR, plus a nightly
# long-running soak (see docs/implementation/testing-and-verification-strategy.md).
on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Nightly long-running suites (02:00 UTC).
    - cron: "0 2 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Fast host unit tests for dominion-core (the architecture-independent core) ──
  host-tests:
    name: host tests (dominion-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview, clippy
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Unit tests
        working-directory: dominion-core
        run: cargo test --lib --features demo-crypto
      - name: Clippy (deny warnings)
        working-directory: dominion-core
        run: cargo clippy --all-targets --features demo-crypto -- -D warnings

  # ── Cross-build the core for both target architectures (no_std) ──
  cross-build:
    name: cross-build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-none, aarch64-unknown-none]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly + target
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build dominion-core (no_std)
        working-directory: dominion-core
        run: cargo build --release --target ${{ matrix.target }}

  # ── Boot the kernel under QEMU and run the on-metal self-test battery ──
  on-metal:
    name: on-metal selftests (QEMU x86_64)
    runs-on: ubuntu-latest
    needs: cross-build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly + x86_64-unknown-none
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-none
      - uses: Swatinem/rust-cache@v2
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86
      - name: Build kernel for selftest
        working-directory: kernel
        run: cargo build --release --target x86_64-unknown-none --features qemu_test
      - name: Boot kernel selftest in QEMU
        if: success()
        run: |
          # Build the kernel binary (cross-compile step already produced it)
          qemu-system-x86_64 \
            -nographic \
            -serial stdio \
            -m 256M \
            -kernel target/x86_64-unknown-none/release/kernel \
            -append "selftest" \
            -no-reboot \
            -device isa-debug-exit,iobase=0xf4,iosize=0x04 \
            | timeout 60 grep -q "selftest: all passed" && echo "QEMU boot OK" || exit 1

  # ── Nightly long-running soak (only on the scheduled run) ──
  soak:
    name: nightly soak
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - name: Long-running DST seed sweep + soak harness
        working-directory: dominion-core
        env:
          DOMINION_SOAK: "1"
        run: cargo test --release --lib --features demo-crypto -- testkit dst
